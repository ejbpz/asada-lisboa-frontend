<div class="join">
  <button (click)="beforePage()" [disabled]="offset() <= 1" class="join-item btn btn-neutral-content text-neutral">«</button>
  <button class="join-item btn btn-neutral-content text-neutral">{{ page() }}</button>
  <button (click)="nextPage()" [disabled]="offset() + pageSize >= total()" class="join-item btn btn-neutral-content text-neutral">»</button>
</div>
