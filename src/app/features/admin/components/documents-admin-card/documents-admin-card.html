<tr class="flex justify-center items-center w-full py-5 max-h-24">
  <td class="h-full flex items-center">
    <svg class="w-7 h-7"><use class="w-full h-full" [attr.href]="iconType(document()?.fileName)"></use></svg>
  </td>
  <td class="w-full h-full flex flex-col gap-2 flex-1">
    <div>
      @if(document()?.statusId === publicStatus().id) {
        <a [href]="generateContent.url(document()?.filePath)" target="_blank" rel="noopener noreferrer" class="hover:underline">
          <h2 class="text-lg font-bold line-clamp-1 text-ellipsis h-7 max-h-7 sm:text-xl">{{ document()?.title | titlecase }}</h2>
        </a>
      } @else {
        <h2 class="text-lg font-bold line-clamp-1 text-ellipsis h-7 max-h-7 sm:text-xl">{{ document()?.title | titlecase }}</h2>
      }
      <p class="text-sm font-light line-clamp-1 text-ellipsis">{{ document()?.description }}</p>
    </div>

  </td>
  <td>
    @if(document()?.statusId === publicStatus().id) {
      <span class="text-sm font-light line-clamp-1 text-ellipsis">Publicado</span>
    } @else {
      <span class="text-sm font-light line-clamp-1 text-ellipsis">Borrador</span>
    }
  </td>
  <td class="h-full flex items-center">
    <a [routerLink]="['/admin/documento/', document()?.id]" class="cursor-pointer">
      <svg class="w-6 h-6"><use class="w-full h-full" href="assets/icons/pencil-icon.svg"></use></svg>
    </a>
    <button (click)="onDeleteDocument()" class="cursor-pointer">
      <svg class="w-6 h-6"><use class="w-full h-full" href="assets/icons/trash-icon.svg"></use></svg>
    </button>
  </td>
</tr>
