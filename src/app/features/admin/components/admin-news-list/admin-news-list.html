@for (newData of newsData(); track newData.id) {
  <news-admin-card [newData]="newData" (deleteRequest)="openDeleteModal($event)" [statuses]="statuses()"/>
}

<dialog #deleteNewModal class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <h3 class="text-lg font-bold">¡Hola!</h3>
    <p class="py-4">¿Estás seguro/a que quieres eliminar ésta noticia?</p>
    <div class="modal-action">
      <div>
        <button type="button" (click)="closeDeleteModal()" class="btn btn-primary text-base-100">Cancelar</button>
        <button type="button" (click)="confirmDelete()" class="ml-2 btn btn-error text-base-100">Eliminar</button>
      </div>
    </div>
  </div>
</dialog>
