<div class="w-full flex flex-col items-between justify-center sm:flex-row">
  <div class="w-full sm:w-[60%] mb-5">
    <get-back-title title="Documentos" isAdmin>
      <div section-description>Administra los documentos disponibles, permitiendo su creación, actualización, consulta y eliminación.</div>
    </get-back-title>
  </div>
  <div class="w-full sm:w-[40%] flex sm:justify-end items-center px-5">
    <a [routerLink]="['/admin/documento']" class="btn btn-primary text-base-100">Nuevo documento</a>
  </div>
</div>
<div class="w-full flex flex-col gap-5 p-5">
  <div class="flex flex-col items-center">
    <div class="w-full">
      @if(documentsResource.isLoading()) {
        <div class="my-10 w-full flex items-center justify-center">
          <span class="loading loading-spinner loading-md"></span>
        </div>
      }
      @else if(documentsResource.hasValue()) {
        <search-bar [stateValue]="filters()" [sortBy]="sortBy" [filterBy]="filterBy" (emitSearch)="onSearchSortForm($event)"/>
        <admin-documents-list [documents]="documentsResource.value().data" [statuses]="statuses()"/>
        <pagination-list [offset]="filters().offset ?? 0" [total]="documentsResource.value().total" (emmitOffset)="onOffsetChange($event)"/>
      }
    </div>
  </div>
</div>
