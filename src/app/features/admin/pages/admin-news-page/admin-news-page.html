<div class="flex flex-col justify-center items-center w-full container my-12.5 md:my-25">
  <div class="w-full flex flex-col items-between justify-center sm:flex-row">
    <div class="w-full sm:w-[60%] mb-5">
      <get-back-title title="Noticias" isAdmin>
        <div section-description>Desde aquí puedes gestionar todas las noticias, permitiendo su creación, actualización, consulta y eliminación.</div>
      </get-back-title>
    </div>
    <div class="w-full sm:w-[40%] flex sm:justify-end items-center px-5">
      <a class="btn btn-primary text-base-100">Nueva noticia</a>
    </div>
  </div>
  <div class="w-full flex flex-col gap-5 p-5">
    <div class="flex flex-col items-center">
      <div class="w-full">
        @if(newsResource.isLoading()) {
          <div class="my-10 w-full flex items-center justify-center">
            <span class="loading loading-spinner loading-md"></span>
          </div>
        }
        @else if(newsResource.hasValue()) {
          <search-bar [stateValue]="filters()" [sortBy]="sortBy" [filterBy]="filterBy" (emitSearch)="onSearchSortForm($event)"/>
          <admin-news-list [news]="newsResource.value().data"/>
          <pagination-list [offset]="filters().offset ?? 0" [total]="newsResource.value().total" (emmitOffset)="onOffsetChange($event)"/>
        }
      </div>
    </div>
  </div>
</div>
