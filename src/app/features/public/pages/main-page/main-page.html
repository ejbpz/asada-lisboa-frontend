<!-- Hero section -->
<div class="flex justify-center py-12.5 lg:py-25 px-4 lg:px-12">
  <div class="container">
    <div class="hero">
      <div class="hero-content flex flex-col justify-between items-center gap-5 gap-y-8 md:flex-row">
        <div class="w-full md:w-1/2">
          <div>
            <h1 class="text-5xl font-bold">{{ 'asada' | uppercase }}</h1>
            <h2 class="text-3xl font-medium">{{ 'Urbanización Lisboa' | titlecase }}</h2>
          </div>
          <p class="py-6">
            Administramos el servicio de agua potable en Urbanización Lisboa, ofreciendo a la comunidad un acceso seguro, continuo y transparente al recurso más importante: <span class="text-primary font-semibold">el agua</span>.
          </p>
          <a [routerLink]="['/noticias']" class="btn btn-primary text-base-100">Noticias</a>
        </div>
        <div class="grid grid-cols-2 grid-rows-5 gap-3 w-full aspect-4/5 max-h-[60vh] transform -scale-x-100 md:w-1/2 md:scale-x-100">
          <img
          src="https://asadalisboa.org/images/galeria/Tanques/tanque1-1.jpg"
          class="rounded-lg shadow-2xl row-start-2 row-span-3 object-cover w-full h-full"
          />
          <img
          src="https://asadalisboa.org/images/galeria/Tanques/tanque20.jpg"
          class="rounded-lg shadow-2xl col-start-2 row-span-2 object-cover w-full h-full"
          />
          <img
          src="https://asadalisboa.org/images/galeria/Tanques/tanque1-4.jpg"
          class="rounded-lg shadow-2xl col-start-2 row-start-3 row-span-3 object-cover w-full h-full"
          />
        </div>
      </div>
    </div>
  </div>
</div>

<!-- News section -->
<div class="flex justify-center bg-base-content py-12.5 lg:py-25 px-4 lg:px-12 text-base-100">

  </div>
</div>
