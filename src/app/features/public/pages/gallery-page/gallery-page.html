<div class="flex flex-col justify-center items-start w-full container my-12.5 md:my-25">
  <div class="w-full sm:w-[60%] mb-5">
    <get-back-title title="Galería">
      <div section-description>Galería de imágenes que muestran trabajos realizados, mejoras, reparaciones y proyectos en el sistema de agua en beneficio de la comunidad.</div>
    </get-back-title>
  </div>
  <div class="w-full flex flex-col gap-5 p-5">
    <div class="flex flex-col items-center">
      <div class="w-full max-w-300">
        @if(imagesResource.isLoading()) {
          <div class="my-10 w-full flex items-center justify-center">
            <span class="loading loading-spinner loading-md"></span>
          </div>
        }
        @else if(imagesResource.hasValue()) {
          <search-bar [stateValue]="filters()" [sortBy]="sortBy" [filterBy]="filterBy" (emitSearch)="onSearchSortForm($event)"/>
          <gallery-list [images]="imagesResource.value().data"/>
          <pagination-list [offset]="filters().offset ?? 0" [total]="imagesResource.value().total" (emmitOffset)="onOffsetChange($event)"/>
        }
      </div>
    </div>
  </div>
</div>
